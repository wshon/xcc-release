name: Manual Build

on:
  workflow_dispatch:
    inputs:
      upload_artifact:
        description: 'Upload build artifact'
        required: false
        default: 'true'
        type: boolean

env:
  CARGO_TERM_COLOR: always
  CARGO_INCREMENTAL: 0  # 禁用增量编译，减少缓存大小
  CARGO_PROFILE_RELEASE_DEBUG: 0  # 不生成调试信息

jobs:
  build-windows:
    runs-on: windows-latest
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          submodules: recursive
          token: ${{ secrets.GH_PAT }}
      
      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: stable
      
      - name: Rust Cache
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: src
          cache-on-failure: true
          shared-key: build
      
      - name: Install cargo-binstall
        uses: cargo-bins/cargo-binstall@main
      
      - name: Install cargo-packager
        run: cargo binstall cargo-packager --no-confirm --force
      
      - name: Build release
        working-directory: src
        run: cargo build --release --locked
      
      - name: Package application
        working-directory: src
        run: cargo packager --release
      
      - name: Find installer
        id: find_installer
        shell: pwsh
        run: |
          $installer = Get-ChildItem -Path "src/target/release" -Filter "*.exe" -Recurse | Select-Object -First 1
          if ($installer) {
            echo "installer_path=$($installer.FullName)" >> $env:GITHUB_OUTPUT
            echo "installer_name=$($installer.Name)" >> $env:GITHUB_OUTPUT
            echo "Found installer: $($installer.FullName)"
          } else {
            echo "No installer found!"
            exit 1
          }
      
      - name: Upload artifacts
        if: ${{ inputs.upload_artifact == true }}
        uses: actions/upload-artifact@v4
        with:
          name: windows-installer
          path: ${{ steps.find_installer.outputs.installer_path }}
